apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-uat
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: gosi-mysql-pv-uat
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard-uat
  hostPath:
    path: /mnt/data/gosi-mysql-uat

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gosi-mysql-pvc
spec:
  volumeName: gosi-mysql-pv-uat
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard-uat

---

apiVersion: v1
kind: Service
metadata:
  name: gosi-mysql
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: gosi-mysql

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosi-mysql-deployment
  labels:
    app: gosi-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gosi-mysql
  template:
    metadata:
      labels:
        app: gosi-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:9.1.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root123"
            - name: MYSQL_DATABASE
              value: "gosi_drupal"
            - name: MYSQL_USER
              value: "gosi_user"
            - name: MYSQL_PASSWORD
              value: "gosi_pass123"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: gosi-mysql-pvc