apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: drupal-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Umair-Gillani/Drupal-Portal-Automation.git
    targetRevision: main
    path: k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: drupal-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
