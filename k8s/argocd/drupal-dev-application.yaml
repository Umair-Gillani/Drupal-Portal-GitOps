apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: drupal-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Umair-Gillani/Drupal-Portal-GitOps.git
    targetRevision: main
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: drupal-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
